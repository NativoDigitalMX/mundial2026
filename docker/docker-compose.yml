services:
  mysql:
    image: mysql:8.0
    container_name: mundial2026-mysql_DEV
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: mundial2026
      MYSQL_USER: mundial_user
      MYSQL_PASSWORD: mundial_pass
    ports:
      - "3307:3306"  # Usamos 3307 para no conflictar con XAMPP
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    build: ../backend
    container_name: mundial2026-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: mundial_user
      DB_PASSWORD: mundial_pass
      DB_NAME: mundial2026
      NODE_ENV: production
    ports:
      - "3001:3001"
    volumes:
      - ../backend:/app
      - /app/node_modules
    command: 
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5
  
volumes:
  mysql_data: