services:
  mysql:
    image: mysql:8.0
    container_name: mundial2026-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: mundial2026
      MYSQL_USER: mundial_user
      MYSQL_PASSWORD: mundial_pass
    ports:
      - "3308:3306"  # Usamos 3308 para no conflictar con XAMPP
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 40s
  backend:
    build: ./backend
    container_name: mundial2026-backend
    # restart: unless-stopped
    restart: on-failure:5
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: mundial_user
      DB_PASSWORD: mundial_pass
      DB_NAME: mundial2026
      NODE_ENV: production
    ports:
      - "3001:3001"
    # volumes:
    #   - ./backend:/app
    #   - /app/node_modules
  nginx:
    image: nginx:alpine
    container_name: mundial2026-nginx
    restart: unless-stopped
    ports:
      - "8082:80"
      - "443:443"  # para HTTPS después
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro  # Volumen SSL
    depends_on:
      - backend
    networks:
      - default  # usa la misma red que los demás
volumes:
  mysql_data:
