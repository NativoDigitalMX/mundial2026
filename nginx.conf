events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
        
    # --- BLOQUE HTTP (PUERTO 80) - REDIRIGE A HTTPS ---
    server {
       listen 80;
       server_name timbaloonatica.com www.timbaloonatica.com;
                        
    # Permitir validación para futuras renovaciones
       location /.well-known/ {
         root /usr/share/nginx/html;
         try_files $uri =404;
       }
                                                        
     # Todo lo demás redirige a HTTPS
       location / {
           return 301 https://$host$request_uri;
       }
                                                                                }
	  # --- BLOQUE HTTPS (PUERTO 443) - TU APP SEGURA ---
    server {
        listen 443 ssl;
        server_name timbaloonatica.com www.timbaloonatica.com;
        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        root /usr/share/nginx/html;
        index index.html;

        location /assets/ {
            alias /usr/share/nginx/html/assets/;
            expires 1y;
            add_header Cache-Control "public, immutable";
         }
            
        location /api {
            proxy_pass http://backend:3001;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
                                                              
        location / {
            try_files $uri $uri/ /index.html;
            expires 1h;
            add_header Cache-Control "public, no-transform";
        }
    }
}
